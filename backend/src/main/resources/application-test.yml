spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/dineops_test}
    username: ${TEST_DB_USERNAME:dineops}
    password: ${TEST_DB_PASSWORD:change-me-test}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}

app:
  jwt:
    secret: ${TEST_JWT_SECRET:test-secret-replace-with-32-byte-random}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}