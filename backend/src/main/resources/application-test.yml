spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/dineops_test}
    username: ${TEST_DB_USERNAME:dineops}
    password: ${TEST_DB_PASSWORD:change-me-test}
    hikari:
      pool-name: ${TEST_DB_POOL_NAME:dineops-test-hikari}
      maximum-pool-size: ${TEST_DB_MAX_POOL_SIZE:5}
      minimum-idle: ${TEST_DB_MIN_IDLE:1}
      idle-timeout: ${TEST_DB_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${TEST_DB_MAX_LIFETIME_MS:300000}
      connection-timeout: ${TEST_DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${TEST_DB_VALIDATION_TIMEOUT_MS:5000}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}

app:
  jwt:
    secret: ${TEST_JWT_SECRET:test-secret-replace-with-32-byte-random}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${TEST_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: ${TEST_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
    allowed-headers: ${TEST_CORS_ALLOWED_HEADERS:*}
    max-age-seconds: ${TEST_CORS_MAX_AGE_SECONDS:3600}