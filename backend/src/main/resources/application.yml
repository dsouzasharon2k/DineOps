spring:
  application:
    name: dineops-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/dineops
    username: dineops
    password: dineops123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    user:
      name: disabled
      password: disabled

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: dineops-super-secret-key-change-this-in-production-min-32-chars
    expiration-ms: 86400000