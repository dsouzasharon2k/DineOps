# DineOps Spring Boot backend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dineops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dineops-backend:latest
          # Use local image built into Kind - don't pull from registry
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/dineops
            - name: SPRING_DATASOURCE_USERNAME
              value: dineops
            - name: SPRING_DATASOURCE_PASSWORD
              value: dineops123
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: APP_JWT_SECRET
              value: dineops-super-secret-key-change-this-in-production-min-32-chars
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dineops
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
