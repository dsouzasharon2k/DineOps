server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # Enable gzip compression for better frontend performance.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-font-opentype;

  # Baseline security headers (tune CSP if you add external assets later).
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer-when-downgrade always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  # Prevent stale HTML after deployments.
  location = /index.html {
    add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  # Cache static assets aggressively (hashed filenames from Vite).
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri $uri/ =404;
  }

  # SPA routing: serve index.html for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

